name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/557448715890/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@anna-ml-pipeline.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Pytest
        env:
          USE_BIGQUERY: "true"
          GCP_PROJECT: "anna-ml-pipeline"
          GOOGLE_CLOUD_PROJECT: "anna-ml-pipeline"
          GCS_BUCKET: "anna-ml-pipeline-bucket"
        run: |

          pytest

      - name: Configure Docker Auth
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/anna-ml-pipeline/ecommerce-ml-pipeline/pipeline-image:latest .

      - name: Push Docker Image
        run: |
          docker push us-central1-docker.pkg.dev/anna-ml-pipeline/ecommerce-ml-pipeline/pipeline-image:latest

      - name: Deploy FastAPI API to Cloud Run
        run: |
          gcloud run deploy api-service \
            --image us-central1-docker.pkg.dev/anna-ml-pipeline/ecommerce-ml-pipeline/pipeline-image:latest \
            --port 8000 \
            --allow-unauthenticated \
            --set-env-vars USE_BIGQUERY=true,GCP_PROJECT=anna-ml-pipeline,GOOGLE_CLOUD_PROJECT=anna-ml-pipeline,MLFLOW_TRACKING_URI=file:/Users/Anna/ecommerce-data-pipeline/mlruns,GCS_BUCKET=anna-ml-pipeline-bucket \
            --region us-central1


      - name: Deploy Streamlit Dashboard to Cloud Run
        run: |
          API_URL=$(gcloud run services describe api-service --region us-central1 --format="value(status.url)")
          gcloud run deploy dashboard-service \
            --image us-central1-docker.pkg.dev/anna-ml-pipeline/ecommerce-ml-pipeline/pipeline-image:latest \
            --command "streamlit" \
            --args="run,streamlit_app.py,--server.port,8080,--server.address,0.0.0.0" \
            --port 8080 \
            --allow-unauthenticated \
            --set-env-vars USE_BIGQUERY=true,GCP_PROJECT=anna-ml-pipeline,GOOGLE_CLOUD_PROJECT=anna-ml-pipeline,API_URL=$API_URL,GCS_BUCKET=anna-ml-pipeline-bucket \
            --region us-central1


